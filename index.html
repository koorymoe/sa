<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>شركة الاماني - تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-logo">🏗️</div>
  <h1>شركة الاماني</h1>
  <p class="subtitle">نظام إدارة الموردين والتخصصات</p>
  <form id="loginForm">
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <div class="password-field">
        <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
        <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <div id="loginError" class="error-msg" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-full">تسجيل الدخول &larr;</button>
  </form>
</div>
<script>
(function(){
  if(!localStorage.getItem('al_users')){
    localStorage.setItem('al_users',JSON.stringify([
      {id:'1',username:'admin',password:'admin123',role:'admin',name:'المدير العام',createdAt:new Date().toISOString()}
    ]));
  }
  if(!localStorage.getItem('al_specialties')){
    localStorage.setItem('al_specialties',JSON.stringify([
      'أعمال مساحة',
      'تصاميم إنشائية واستشارات هندسية',
      'تصاميم معمارية',
      'مكتب مقاولات',
      'أعمال ترابية',
      'تأجير آليات',
      'التأسيسات والأنظمة',
      'المواد الصحية',
      'كيميائيات البناء الحديث',
      'التشطيبات',
      'خباطات الخرسانة',
      'خدمات أخرى'
    ]));
  }
  if(!localStorage.getItem('al_suppliers')) localStorage.setItem('al_suppliers','[]');
  if(sessionStorage.getItem('al_user')) location.href='dashboard.html';
})();

document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const users=JSON.parse(localStorage.getItem('al_users')||'[]');
  const user=users.find(x=>x.username===u&&x.password===p);
  const err=document.getElementById('loginError');
  if(user){
    sessionStorage.setItem('al_user',JSON.stringify(user));
    location.href='dashboard.html';
  } else {
    err.textContent='❌ اسم المستخدم أو كلمة المرور غير صحيحة';
    err.style.display='block';
  }
});

function togglePwd(){
  const el=document.getElementById('password');
  el.type=el.type==='password'?'text':'password';
}
</script>
</body>
</html>
